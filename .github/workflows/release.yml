name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Ruby xcodeproj dependency
        shell: bash
        run: gem install xcodeproj --no-document

      - name: Export active developer directory
        shell: bash
        run: echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="$(./scripts/current-version.sh --raw)"
          bundle_version="$(./scripts/current-version.sh --bundle)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bundle_version=$bundle_version" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        shell: bash
        run: |
          expected_tag="v${{ steps.version.outputs.version }}"
          actual_tag="${GITHUB_REF_NAME}"
          if [[ "$actual_tag" != "$expected_tag" ]]; then
            printf 'Tag mismatch: expected %s but got %s\n' "$expected_tag" "$actual_tag" >&2
            exit 1
          fi

      - name: Determine release mode
        id: release_mode
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          required=(
            APPLE_DEVELOPER_ID_APP_CERT_BASE64
            APPLE_DEVELOPER_ID_APP_CERT_PASSWORD
            APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64
            APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD
            APPLE_DEVELOPER_ID_APPLICATION_IDENTITY
            APPLE_DEVELOPER_ID_INSTALLER_IDENTITY
            APPLE_API_KEY_ID
            APPLE_API_ISSUER_ID
            APPLE_API_PRIVATE_KEY_BASE64
          )

          release_mode="signed"
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              release_mode="unsigned"
              break
            fi
          done

          if [[ "$release_mode" == "signed" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "asset_suffix=" >> "$GITHUB_OUTPUT"
            echo "title_suffix=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "asset_suffix=-unsigned" >> "$GITHUB_OUTPUT"
            echo "title_suffix= (unsigned beta)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine release tag
        id: release_tag
        shell: bash
        run: echo "tag=v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Run verification
        shell: bash
        run: ./scripts/verify.sh --standard

      - name: Import Apple signing assets
        if: steps.release_mode.outputs.mode == 'signed'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          for secret_name in \
            APPLE_DEVELOPER_ID_APP_CERT_BASE64 \
            APPLE_DEVELOPER_ID_APP_CERT_PASSWORD \
            APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64 \
            APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD \
            APPLE_API_PRIVATE_KEY_BASE64
          do
            if [[ -z "${!secret_name:-}" ]]; then
              printf 'Missing required GitHub secret: %s\n' "$secret_name" >&2
              exit 1
            fi
          done

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          tmp = Path(os.environ['RUNNER_TEMP'])
          (tmp / 'developer-id-app.p12').write_bytes(base64.b64decode(os.environ['APPLE_DEVELOPER_ID_APP_CERT_BASE64']))
          (tmp / 'developer-id-installer.p12').write_bytes(base64.b64decode(os.environ['APPLE_DEVELOPER_ID_INSTALLER_CERT_BASE64']))
          (tmp / 'AuthKey.p8').write_bytes(base64.b64decode(os.environ['APPLE_API_PRIVATE_KEY_BASE64']))
          PY

          keychain="$RUNNER_TEMP/goto-release.keychain-db"
          keychain_password="$(openssl rand -hex 20)"

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$RUNNER_TEMP/developer-id-app.p12" -k "$keychain" -P "$APPLE_DEVELOPER_ID_APP_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security import "$RUNNER_TEMP/developer-id-installer.p12" -k "$keychain" -P "$APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"

          {
            echo "APPLE_API_PRIVATE_KEY_PATH=$RUNNER_TEMP/AuthKey.p8"
          } >> "$GITHUB_ENV"

      - name: Build package
        id: package
        shell: bash
        env:
          GOTO_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          GOTO_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
        run: |
          pkg_name="goto-${{ steps.version.outputs.version }}${{ steps.release_mode.outputs.asset_suffix }}.pkg"
          pkg_path="$(./scripts/build-pkg.sh "$PWD/build/$pkg_name")"
          echo "pkg_path=$pkg_path" >> "$GITHUB_OUTPUT"

          if [[ "${{ steps.release_mode.outputs.mode }}" == "unsigned" ]]; then
            {
              echo "### Unsigned beta release"
              echo
              echo "Apple signing/notarization secrets were not configured, so this release was built as an unsigned package."
              echo "Users will need to approve installation in macOS Privacy & Security via **Open Anyway**."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Smoke package payload
        shell: bash
        run: ./scripts/package-smoke.sh "${{ steps.package.outputs.pkg_path }}"

      - name: Notarize package
        if: steps.release_mode.outputs.mode == 'signed'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_PATH: ${{ env.APPLE_API_PRIVATE_KEY_PATH }}
        run: |
          for secret_name in APPLE_API_KEY_ID APPLE_API_ISSUER_ID APPLE_API_PRIVATE_KEY_PATH; do
            if [[ -z "${!secret_name:-}" ]]; then
              printf 'Missing required value for notarization: %s\n' "$secret_name" >&2
              exit 1
            fi
          done

          ./scripts/notarize-pkg.sh "${{ steps.package.outputs.pkg_path }}"

      - name: Create checksum
        id: checksum
        shell: bash
        run: |
          checksum_path="${{ steps.package.outputs.pkg_path }}.sha256"
          shasum -a 256 "${{ steps.package.outputs.pkg_path }}" > "$checksum_path"
          echo "checksum_path=$checksum_path" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub CLI is available
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi
          gh --version

      - name: Ensure release tag does not already exist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release_tag.outputs.tag }}" >/dev/null 2>&1; then
            printf 'Release %s already exists\n' "${{ steps.release_tag.outputs.tag }}" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=()
          if [[ "${{ steps.release_mode.outputs.prerelease }}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${{ steps.release_tag.outputs.tag }}" \
            "${{ steps.package.outputs.pkg_path }}" \
            "${{ steps.checksum.outputs.checksum_path }}" \
            --title "goto ${{ steps.version.outputs.version }}${{ steps.release_mode.outputs.title_suffix }}" \
            --generate-notes \
            "${release_args[@]}"
