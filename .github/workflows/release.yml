name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. v1.2.3). Leave blank to auto-bump patch."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: ver
        env:
          OVERRIDE_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE_VERSION:-}" ]; then
            NEXT="$OVERRIDE_VERSION"
          else
            LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)
            if [ -z "$LATEST" ]; then
              NEXT="v0.1.0"
            else
              STRIP=${LATEST#v}
              MAJOR=$(echo "$STRIP" | cut -d. -f1)
              MINOR=$(echo "$STRIP" | cut -d. -f2)
              PATCH=$(echo "$STRIP" | cut -d. -f3)
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          if ! [[ "$NEXT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Resolved version '$NEXT' is not a valid SemVer (vMAJOR.MINOR.PATCH)."
            exit 1
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "next_no_v=${NEXT#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved next version: $NEXT"

      - name: Abort if tag already exists
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/$NEXT" >/dev/null 2>&1; then
            echo "::error::Tag $NEXT already exists. Bump manually or run workflow_dispatch with an explicit version."
            exit 1
          fi

      - name: Install build tools
        run: |
          set -euo pipefail
          brew install xcodegen create-dmg

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release artifacts
        run: |
          set -euo pipefail
          common=(
            -project Goto.xcodeproj
            -configuration Release
            -derivedDataPath ./build
          )
          xcodebuild "${common[@]}" -scheme Goto build
          xcodebuild "${common[@]}" -scheme GotoLauncher build
          xcodebuild "${common[@]}" -scheme GotoCLI build

      - name: Build installer package
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          ./scripts/build-installer.sh "$NEXT"

      - name: Stage DMG contents
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          rm -rf dist/dmg
          mkdir -p dist/dmg
          cp "./dist/Goto-$NEXT.pkg" "./dist/dmg/Install Goto.pkg"
          cp scripts/uninstall.sh "./dist/dmg/Uninstall Goto.command"
          chmod +x "./dist/dmg/Uninstall Goto.command"
          cp README.md ./dist/dmg/README.md

      - name: Build DMG
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          rm -f "./dist/Goto-$NEXT.dmg"
          create-dmg \
            --skip-jenkins \
            --volname "Goto $NEXT" \
            "./dist/Goto-$NEXT.dmg" \
            ./dist/dmg/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          git tag "$NEXT"
          git push origin "$NEXT"
          gh release create "$NEXT" \
            --generate-notes \
            --title "$NEXT" \
            "./dist/Goto-$NEXT.dmg"
